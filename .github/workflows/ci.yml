name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.mpi }})
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - mpi: mpich
            image: ubuntu:22.04
          - mpi: openmpi
            image: ubuntu:24.04
    env:
      OMPI_ALLOW_RUN_AS_ROOT: 1
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1

    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential autoconf automake libtool pkg-config git ca-certificates electric-fence
          if [ "${{ matrix.mpi }}" = "mpich" ]; then
            apt-get install -y mpich
          else
            apt-get install -y libopenmpi-dev openmpi-bin
          fi
          git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            build
            schema-tools
          key: ${{ runner.os }}-${{ matrix.mpi }}-deps-${{ hashFiles('prepare.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.mpi }}-deps-

      - name: Prepare dependencies (IOR, pfind, schema-tools)
        run: ./prepare.sh

      - name: Build
        run: make

      - name: MPI sanity check
        run: |
          echo "mpiexec: $(command -v mpiexec) -> $(readlink -f "$(command -v mpiexec)")"
          mpiexec --version | head -2
          echo "--- ldd io500 ---"; ldd ./io500 | grep -iE 'mpi|pmi' || true
          echo "--- PMI/OMPI env seen by each rank ---"
          mpiexec -np 2 sh -c 'echo "rank PMI=${PMI_RANK:-unset}/${PMI_SIZE:-unset} OMPI=${OMPI_COMM_WORLD_RANK:-unset}/${OMPI_COMM_WORLD_SIZE:-unset}"'

      - name: Run benchmark (debug config)
        run: ./io500.sh config-debug-run.ini
