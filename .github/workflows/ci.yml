name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.mpi }})
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    strategy:
      fail-fast: false
      matrix:
        mpi: [mpich, openmpi]
    env:
      OMPI_ALLOW_RUN_AS_ROOT: 1
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1

    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential autoconf automake libtool pkg-config git ca-certificates electric-fence
          if [ "${{ matrix.mpi }}" = "mpich" ]; then
            apt-get install -y mpich
          else
            apt-get install -y libopenmpi-dev openmpi-bin
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            build
            schema-tools
          key: ${{ runner.os }}-${{ matrix.mpi }}-deps-${{ hashFiles('prepare.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.mpi }}-deps-

      - name: Prepare dependencies (IOR, pfind, schema-tools)
        run: ./prepare.sh

      - name: Build
        run: make

      - name: Run benchmark (debug config)
        run: ./io500.sh config-debug-run.ini
